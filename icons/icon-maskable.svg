<?xml version="1.0" encoding="UTF-8"?>
<!-- Maskable variant: main art confined to the inner safe-zone (center 80%),
     with background bleed across the full 512×512 canvas. -->
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffb3d1"/>
      <stop offset="50%" stop-color="#c9a7e8"/>
      <stop offset="100%" stop-color="#a4c8f5"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.45" r="0.6">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Full-bleed background (outer 20% may be clipped by the OS mask). -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#glow)"/>
  <!-- Minor decoration kept inside the safe zone (pixels 52..460) -->
  <circle cx="140" cy="160" r="14" fill="#ffffff" opacity="0.32"/>
  <circle cx="380" cy="180" r="10" fill="#ffffff" opacity="0.35"/>
  <circle cx="380" cy="360" r="16" fill="#ffffff" opacity="0.28"/>
  <!-- Fox, scaled down so it fits the safe zone centered on 256,256 -->
  <text x="256" y="318"
        font-family="Apple Color Emoji, Segoe UI Emoji, Noto Color Emoji, sans-serif"
        font-size="210"
        text-anchor="middle"
        dominant-baseline="alphabetic">🦊</text>
</svg>
